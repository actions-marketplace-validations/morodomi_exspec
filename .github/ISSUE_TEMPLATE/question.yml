name: Question
description: Configuration help, usage questions, or general discussion
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: "What would you like to know?"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: "Any relevant context (language, framework, config, etc.)"
    validations:
      required: false
