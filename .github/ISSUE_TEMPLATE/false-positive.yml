name: False Positive Report
description: A rule flagged code that should not be flagged
labels: ["false-positive"]
body:
  - type: input
    id: rule
    attributes:
      label: Rule ID
      description: "Which rule triggered the false positive? (e.g. T001, T002)"
      placeholder: "T001"
    validations:
      required: true
  - type: input
    id: language
    attributes:
      label: Language
      description: "Which language is the test file written in?"
      placeholder: "Python / TypeScript / PHP / Rust"
    validations:
      required: true
  - type: input
    id: framework
    attributes:
      label: Test Framework
      description: "Which test framework are you using?"
      placeholder: "pytest / Jest / Vitest / PHPUnit / Pest / cargo test"
    validations:
      required: true
  - type: textarea
    id: code
    attributes:
      label: Test Code
      description: "Minimal test code that triggers the false positive"
      render: text
    validations:
      required: true
  - type: textarea
    id: exspec-output
    attributes:
      label: exspec Output
      description: "The output from exspec (terminal or JSON)"
      render: text
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why is this a false positive?
      description: "Explain why this test should not be flagged"
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: ".exspec.toml (if any)"
      description: "Your exspec config, if relevant"
      render: toml
    validations:
      required: false
